name: Scrape Tradera & Update Chart

on:
  schedule:
    - cron: "3 23 * * *"  # 00:03 CET (23:03 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r mon-amie/requirements.txt

      - name: Scrape and generate chart
        working-directory: mon-amie
        run: python scrape_and_chart.py

      - name: Copy chart to index.html
        run: cp mon-amie/chart.html mon-amie/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mon-amie/
          git diff --staged --quiet || git commit -m "Update Mon Amie price data $(date -u +%Y-%m-%d)"
          git push
